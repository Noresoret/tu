<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#dfd9d9;
color:#222;
padding-top:100px;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:black;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
z-index:1000;
}

header img{
width:100px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:500;
}

nav a:hover{
color:#2a5298;
}

/* SECTION */
section{
padding:100px 20px;
}

.container{
max-width:1100px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:50px;
color:#093997;
}

.leadership-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:120px;
height:120px;
border-radius:50%;
object-fit:contain; /* Changed from cover to contain */
background:#f0f0f0;
margin-bottom:15px;
}

.card h3{
margin-bottom:5px;
color:#1e3c72;
}

.card p{
font-size:14px;
color:#555;
}

/* FOOTER */
footer{
background:#1e3c72;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}
</style>
</head>
